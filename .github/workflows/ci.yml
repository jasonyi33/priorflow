name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (tests + validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest -v

      - name: Validate shared models import
        run: uv run python -c "from shared.models import PatientChart, EligibilityResult, PARequest, AgentRun, AlertPayload"

      - name: Validate server loads
        run: uv run python -c "from server.main import app; assert len(app.routes) > 0"

      - name: Validate chart fixtures
        run: |
          uv run python -c "
          from tools.chart_loader import load_chart, list_available_charts
          charts = list_available_charts()
          assert len(charts) >= 5, f'Expected 5+ charts, got {len(charts)}'
          for mrn in charts:
              chart = load_chart(mrn)
              assert chart.patient.mrn == mrn
          print(f'All {len(charts)} chart fixtures valid')
          "

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
